<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShortyURL - Вхід</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <div
      class="container d-flex justify-content-center align-items-center flex-grow-1"
    >
      <div
        class="card p-4 shadow border-0"
        style="width: 100%; max-width: 400px"
      >
        <div class="d-flex flex-column align-items-center text-center mb-4">
          <div class="d-flex align-items-center">
            <img
              src="./logo.png"
              alt="ShortyURL"
              width="32"
              height="32"
              class="rounded-circle object-fit-cover"
            />
            <h2 class="fw-bold ms-2 mb-0">ShortyURL</h2>
          </div>
          <p class="text-muted">Ласкаво просимо!</p>
        </div>
        <form action="index.html">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label
            ><input type="email" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Пароль</label
            ><input type="password" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">
            Увійти
          </button>
          <div class="text-center mt-3">
            <a
              href="register.html"
              class="small text-decoration-none text-muted"
              >Створити новий акаунт</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
